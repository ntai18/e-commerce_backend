info:
  name: add
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/address/add/me"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  body:
    type: json
    data: |-
      {
      	"name": "string",
      	"phone": "string",
      	"address": "string",
      	"city": "string",
      	"description": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
