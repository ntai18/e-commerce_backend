opencollection: 1.0.0

info:
  name: e-commerce_backend api
config:
  proxy:
    inherit: true
    config:
      protocol: http
      hostname: ""
      port: ""
      auth:
        username: ""
        password: ""
      bypassProxy: ""

request:
  auth:
    type: bearer
    token: "{{bearerToken}}"
  variables:
    - name: baseUrl
      value: http://localhost:8080

docs:
  content: Tài liệu tích hợp các API quản lý Sản phẩm, Đơn hàng và Người dùng.
  type: text/markdown
bundled: false
extensions:
  bruno:
    ignore:
      - node_modules
      - .git
