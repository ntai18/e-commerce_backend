info:
  name: accept-otp
  type: http
  seq: 6

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/accept-otp"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  body:
    type: json
    data: |-
      {
      	"email": "string",
      	"otp": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
