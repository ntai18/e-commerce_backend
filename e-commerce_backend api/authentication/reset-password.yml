info:
  name: reset-password
  type: http
  seq: 7

http:
  method: PATCH
  url: "{{baseUrl}}/api/v1/auth/reset-password"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  body:
    type: json
    data: |-
      {
      	"token": "string",
      	"password": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
