info:
  name: logout
  type: http
  seq: 3

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/logout"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  body:
    type: json
    data: |-
      {
      	"refreshToken": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
