info:
  name: refresh-token
  type: http
  seq: 2

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/refresh-token"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  body:
    type: json
    data: |-
      {
        "refreshToken": "string"
      }

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
