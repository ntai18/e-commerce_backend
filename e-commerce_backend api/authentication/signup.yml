info:
  name: signup
  type: http
  seq: 1

http:
  method: POST
  url: "{{baseUrl}}/api/v1/auth/signup"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  body:
    type: json
    data: |-
      {
      	"username": "string",
      	"password": "string",
      	"email": "string"
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
