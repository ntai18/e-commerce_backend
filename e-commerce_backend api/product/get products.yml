info:
  name: get products
  type: http
  seq: 2

http:
  method: GET
  url: "{{baseUrl}}/api/v1/product/products"
  headers:
    - name: Content-Type
      value: application/json
    - name: Accept
      value: "*/*"
  auth:
    type: bearer
    token: "{{bearerToken}}"

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
